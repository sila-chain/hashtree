name: test
on: [pull_request, workflow_dispatch]

jobs:
  build:
    name: Library - ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.runner }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: MacOS arm64
            target: aarch64-apple-darwin
            runner: macos-latest
          - name: Linux x86
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - name: Linux arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - name: Linux x86 using clang
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cc: clang
          - name: Linux arm64 using clang
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cc: clang
          - name: Windows x86
            target: x86_64-pc-windows-msvc
            runner: windows-latest
          - name: Windows arm64
            target: aarch64-pc-windows-msvc
            runner: windows-latest
          - name: Linux RISC-V 64
            target: riscv64-unknown-linux-gnu
            runner: ubuntu-latest
            cc: riscv64-linux-gnu-gcc
            qemu: qemu-riscv64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install RISC-V toolchain and QEMU
        if: ${{ matrix.settings.qemu }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu qemu-user
      - name: Cross-Compile Build
        if: ${{ matrix.settings.cc != '' }}
        run: CC=${{ matrix.settings.cc }} make all
      - name: Build
        if: ${{ !matrix.settings.cc }}
        run: make all
      - name: Run tests with QEMU
        if: ${{ matrix.settings.qemu }}
        run: ${{ matrix.settings.qemu }} -cpu rv64,zbb=true,zbc=true,zbkb=true,zbkc=true,zbkx=true,zknd=true,zkne=true,zknh=true,zkt=true -L /usr/riscv64-linux-gnu ./build/test
      - name: Run tests
        if: ${{ !matrix.settings.qemu }}
        run: ./build/test

  go-bindings:
    name: Go Bindings - ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.runner }}
    strategy:
      fail-fast: false
      matrix:
        go-version: [ '1.21', '1.22.x' ]
        settings:
          - name: MacOS arm64
            target: aarch64-apple-darwin
            runner: macos-latest
          - name: MacOS x86
            target: x86_64-apple-darwin
            runner: macos-15-intel
            generic_only: true
          - name: Linux x86
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - name: Linux arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - name: Linux x86 using clang
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cc: clang
          - name: Linux arm64 using clang
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cc: clang
          - name: Windows x86
            target: x86_64-pc-windows-msvc
            runner: windows-latest
          - name: Windows arm64
            target: aarch64-pc-windows-msvc
            runner: windows-latest
          - name: Linux RISC-V 64
            target: riscv64-unknown-linux-gnu
            runner: ubuntu-latest
            cc: riscv64-linux-gnu-gcc
            qemu: qemu-riscv64
            goarch: riscv64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install RISC-V toolchain and QEMU
        if: ${{ matrix.settings.qemu }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu qemu-user
      - name: Cross-Compile Build
        if: ${{ matrix.settings.cc != '' && !matrix.settings.qemu }}
        run: CC=${{ matrix.settings.cc }} make go_bindings
      - name: Build
        if: ${{ !matrix.settings.cc && !matrix.settings.generic_only }}
        run: make go_bindings
      - name: Build (generic only)
        if: ${{ matrix.settings.generic_only }}
        run: go build .
      - name: Cross-Compile Build for RISC-V
        if: ${{ matrix.settings.qemu }}
        run: |
          CC=${{ matrix.settings.cc }} make go_bindings
          mv hashtree.syso hashtree_linux_riscv64.syso
      - name: Run tests
        if: ${{ !matrix.settings.qemu }}
        run: go test .
      - name: Run tests with QEMU
        if: ${{ matrix.settings.qemu }}
        run: |
          CGO_ENABLED=1 CC=${{ matrix.settings.cc }} GOOS=linux GOARCH=${{ matrix.settings.goarch }} go test -c -o test.riscv64
          ${{ matrix.settings.qemu }} -cpu rv64,zbb=true,zbc=true,zbkb=true,zbkc=true,zbkx=true,zknd=true,zkne=true,zknh=true,zkt=true -L /usr/riscv64-linux-gnu ./test.riscv64
      - name: Run benchmarks
        if: ${{ !matrix.settings.qemu }}
        run: go test -bench=.

  rust-bindings:
    name: Rust Bindings - ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.runner }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: MacOS arm64
            target: aarch64-apple-darwin
            runner: macos-latest
          - name: Linux x86
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - name: Linux arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use-docker: true
          - name: Windows x86
            target: x86_64-pc-windows-msvc
            runner: windows-latest
          # - name: Windows arm64
          #   target: aarch64-pc-windows-msvc
          #   runner: windows-latest
          #   use-docker: true
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: Set up QEMU
      if: ${{ matrix.settings.use-docker && matrix.settings.runner == 'ubuntu-latest' }}
      uses: docker/setup-qemu-action@v4
      with:
        platforms: arm64
    - name: Build in docker
      if: ${{ matrix.settings.use-docker }}
      run: |
        docker buildx build \
          --build-arg TARGET=${{ matrix.settings.target }} \
          --platform linux/arm64 \
          -t ${{ matrix.settings.target }} \
          .
    - name: install rustup
      if: ${{ !matrix.settings.use-docker }}
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > rustup-init.sh
        sh rustup-init.sh -y --default-toolchain none
        rustup target add ${{ matrix.settings.target }}
    - name: Build and Test
      if: ${{ !matrix.settings.use-docker }}
      run: |
        cargo build --release --target ${{ matrix.settings.target }}
        cargo test --target ${{ matrix.settings.target }}

  nim:
    name: nim
    runs-on: ubuntu-latest
    steps:
      - uses: jiro4989/setup-nim-action@v1
      - uses: actions/checkout@v4
      - name: Run Nim test
        run: nim c -r tests/test_hashtree_abi.nim
